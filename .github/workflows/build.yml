name: Construir instalador de Windows

# Se puede disparar a mano (botón "Run workflow") o al subir una etiqueta vX.Y.Z
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # para publicar la release con el .exe

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Descargar el código
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias
        run: npm ci

      - name: Construir y publicar el instalador (.exe)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-vite build && npx electron-builder --win --publish always
